name: Build cpm repo si publica release

# Trigger manual prin GitHub UI sau `gh workflow run`. Workflow-ul:
#   1. Clone carpatos (sursele cu deb2cpm + build-cpm-repo)
#   2. Descarca .deb-uri din ports.ubuntu.com pe baza seed-urilor
#   3. Converteste fiecare in .cpm
#   4. Publica pool/*.cpm + repo.index ca asset-uri pe un release nou
#      al acestui repo (devopsyields/carpatos-repo).
#
# Folosim GITHUB_TOKEN-ul automat — workflow-ul ruleaza in carpatos-repo
# si publica in carpatos-repo, deci nu avem nevoie de PAT cross-repo.

on:
  workflow_dispatch:
    inputs:
      seeds:
        description: "Pachete seed inline (spatii). Daca gol, foloseste scripts/cpm-essentials.txt din carpatos."
        required: false
        default: ""
      tag:
        description: "Tag pentru release (ex: v0.2.0)"
        required: true
        default: "v0.2-essentials"
      arch:
        description: "Arhitectura Debian (arm64 / amd64)"
        required: true
        default: "arm64"
      ubuntu_release:
        description: "Release Ubuntu (noble / jammy)"
        required: true
        default: "noble"
      release_title:
        description: "Titlu release"
        required: false
        default: ""

permissions:
  contents: write   # necesar pentru gh release create

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 1500+ pachete pot dura
    steps:
      - name: Checkout carpatos-repo (acest repo, pentru workflow + README)
        uses: actions/checkout@v4

      - name: Checkout carpatos (sursele cu build-cpm-repo)
        uses: actions/checkout@v4
        with:
          repository: devopsyields/carpatos
          path: carpatos
          # carpatos e public, GITHUB_TOKEN-ul implicit poate clona.

      - name: Eliberare spatiu (runner-ul are ~14 GB liberi default)
        run: |
          # Sterg toolchain-uri preinstalate care nu ne trebuie
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
                      /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h /

      - name: Instalez dependente sistem
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3 zstd curl

      - name: Construiesc repo .cpm
        run: |
          if [ -z "${{ inputs.seeds }}" ]; then
            echo "[info] folosesc carpatos/scripts/cpm-essentials.txt"
            python3 carpatos/scripts/build-cpm-repo.py \
              --seed-file carpatos/scripts/cpm-essentials.txt \
              -o build/ \
              -r "${{ inputs.ubuntu_release }}" \
              -a "${{ inputs.arch }}" \
              -v
          else
            echo "[info] folosesc seed-uri inline: ${{ inputs.seeds }}"
            python3 carpatos/scripts/build-cpm-repo.py \
              ${{ inputs.seeds }} \
              -o build/ \
              -r "${{ inputs.ubuntu_release }}" \
              -a "${{ inputs.arch }}" \
              -v
          fi

      - name: Sumar
        run: |
          echo "=== pachete generate ==="
          ls build/pool/ | wc -l
          echo "=== top 10 cele mai mari .cpm ==="
          ls -laS build/pool/*.cpm | head -10 | awk '{printf "%6.1fM  %s\n", $5/1024/1024, $9}'
          echo "=== repo.index ==="
          wc -l build/repo.index
          echo "=== dimensiuni totale ==="
          du -sh build/cache build/pool build/repo.index

      - name: Sterg cache (nu publicam .deb-urile)
        run: rm -rf build/cache

      - name: Publica release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="${{ inputs.release_title }}"
          if [ -z "$TITLE" ]; then
            TITLE="Auto build ${{ inputs.tag }} (${{ inputs.ubuntu_release }}/${{ inputs.arch }})"
          fi
          SEED_DESC="${{ inputs.seeds }}"
          if [ -z "$SEED_DESC" ]; then
            SEED_DESC="(scripts/cpm-essentials.txt)"
          fi
          NPACK=$(wc -l < build/repo.index)
          NOTES=$(cat <<EOF
          Auto-build prin GitHub Actions.

          - Seed: $SEED_DESC
          - Ubuntu: ${{ inputs.ubuntu_release }} / ${{ inputs.arch }}
          - Pachete in repo: $NPACK
          - Run: ${{ github.run_id }}

          Configurare client cpm:
          \`\`\`sh
          echo "https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag }}" \\
            | sudo tee /etc/cpm/repo.url
          cpm update && cpm install <pkg>
          \`\`\`
          EOF
          )
          # Creez release-ul fara asset-uri (sa nu hit secondary rate limit
          # cu 1500+ uploads paralele).
          gh release create "${{ inputs.tag }}" \
            --title "$TITLE" \
            --notes "$NOTES"

          # Upload chunk cu retry. ~25 fisiere / 12s = ~2 fisiere/sec, sub
          # secondary rate limit. Cu 1500 pachete -> ~12-15 minute upload.
          upload_chunk() {
            local attempt=1
            while [ $attempt -le 5 ]; do
              if gh release upload "${{ inputs.tag }}" "$@"; then
                return 0
              fi
              echo "[warn] upload esuat (incercare $attempt/5), astept 90s..."
              sleep 90
              attempt=$((attempt + 1))
            done
            echo "[err] upload esuat dupa 5 incercari" >&2
            return 1
          }

          # Inta repo.index (clientii il fetcheaza primul)
          upload_chunk build/repo.index

          # Apoi pool, in chunk-uri de 25
          chunk=()
          i=0
          for f in build/pool/*.cpm; do
            chunk+=("$f")
            i=$((i + 1))
            if [ $((i % 25)) -eq 0 ]; then
              upload_chunk "${chunk[@]}"
              chunk=()
              sleep 12
            fi
          done
          [ ${#chunk[@]} -gt 0 ] && upload_chunk "${chunk[@]}"
          echo "[done] $i pachete uploadate"
